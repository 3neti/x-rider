name: demo
version: 1.0.0

rider:
  stages:
    - type: splash
      key: demo-pre-claim
      presentation: inline
      content: |
        PRE-CLAIM DEMO: Please review this before continuing.
      content_type: markdown
      timeout: 3

    # Future:
    # - type: splash
    #   key: demo-modal
    #   presentation: modal
    #   content: |
    #     MODAL DEMO: This will render in a modal in a later slice.
    #
    # - type: splash
    #   key: demo-fullscreen
    #   presentation: fullscreen
    #   content: |
    #     FULLSCREEN DEMO: This will render before form-flow in a later slice.

    - type: message
      key: demo-success-message
      content: |
        SUCCESS DEMO: Thank you for claiming.
      content_type: markdown

    - type: redirect
      key: demo-redirect
      enabled: false
      url: https://example.com
      timeout: 5
      fallback_url: /x/claim

  success:
    enabled: true
    type: markdown
    content: |
      Demo claim received.

  pending:
    enabled: true
    type: markdown
    content: |
      Demo claim is being processed.

  redirect:
    enabled: false
    timeout: 5
    fallback_url: /x/claim

  analytics:
    enabled: true