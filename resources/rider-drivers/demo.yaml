name: demo
version: 1.0.0

rider:
  stages:
    - type: splash
      key: demo-pre-claim
      presentation: inline
      content: |
        PRE-CLAIM DEMO: Please review this before continuing.
      content_type: markdown
      timeout: 3

    # Future:
    # - type: splash
    #   key: demo-modal
    #   presentation: modal
    #   content: |
    #     MODAL DEMO: This will render in a modal in a later slice.
    #
    # - type: splash
    #   key: demo-fullscreen
    #   presentation: fullscreen
    #   content: |
    #     FULLSCREEN DEMO: This will render before form-flow in a later slice.

    - type: image
      key: demo-image
      presentation: inline
      src: https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?w=1200&auto=format&fit=crop&q=80 #https://placehold.co/600x240?text=x-rider+demo
      alt: x-rider demo banner

    - type: link
      key: demo-link
      payload:
        label: Learn more
        url: https://example.com

    - type: message
      key: demo-success-message
      content: |
        SUCCESS DEMO: Thank you for claiming.
      content_type: markdown

    - type: redirect
      key: demo-redirect
      enabled: false
      url: https://example.com
      timeout: 5
      fallback_url: /x/claim

  success:
    enabled: true
    type: markdown
    content: |
      Demo claim received.

  pending:
    enabled: true
    type: markdown
    content: |
      Demo claim is being processed.

  redirect:
    enabled: false
    timeout: 5
    fallback_url: /x/claim

  analytics:
    enabled: true