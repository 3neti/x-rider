name: demo
version: 1.0.0

rider:
  stages:
    - type: splash
      key: demo-pre-claim
      phase: pre_claim
      presentation: inline
      content: |
        PRE-CLAIM DEMO: Please review this before continuing.
      content_type: markdown
      timeout: 3

    - type: image
      key: demo-image
      phase: pre_claim
      presentation: inline
      src: https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?w=1200&auto=format&fit=crop&q=80
      alt: x-rider demo banner

    - type: link
      key: demo-link
      phase: pre_claim
      payload:
        label: Learn more
        url: https://example.com

    - type: cta
      key: demo-cta
      phase: pre_claim
      presentation: inline
      payload:
        label: Open Reward
        action: open_url
        url: https://example.com/reward

    - type: splash
      key: demo-modal
      phase: pre_claim
      presentation: modal
      content: |
        MODAL DEMO: This appears as a dismissible Rider modal.
      content_type: markdown
      timeout: 3

    - type: splash
      key: demo-fullscreen
      phase: pre_claim
      presentation: fullscreen
      content: |
        FULLSCREEN DEMO: This appears as an immersive Rider experience.
      content_type: markdown
      timeout: 3

    - type: message
      key: demo-success-message
      phase: success
      content: |
        SUCCESS DEMO: Thank you for claiming.
      content_type: markdown

    - type: redirect
      key: demo-redirect
      phase: redirect
      payload:
        url: https://example.com/success
        timeout: 8
        external: true

  success:
    enabled: true
    type: markdown
    content: |
      Demo claim received.

  pending:
    enabled: true
    type: markdown
    content: |
      Demo claim is being processed.

  redirect:
    enabled: false
    timeout: 5
    fallback_url: /x/claim

  analytics:
    enabled: true