name: default
version: 1.0.0

rider:
  stages:
    - type: splash
      key: default-splash
      content: |
        STAGE SPLASH: Welcome!
      timeout: 2

    - type: message
      key: default-message
      content: |
        STAGE MESSAGE: Enjoy your reward.

  success:
    enabled: true
    type: markdown
    content: |
      LEGACY SUCCESS: Thank you. Your claim has been received.

  pending:
    enabled: true
    type: markdown
    content: |
      Your claim has been received and is being processed.

  redirect:
    enabled: false
    timeout: 5
    fallback_url: /x/claim

  analytics:
    enabled: true